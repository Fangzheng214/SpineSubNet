# Baseline Model Configuration - Grayscale Input Only
# Train a baseline model using grayscale images only (single channel)

trainer_type: 'baseline'

experiment:
  root_dir: "experiments"
  name: "baseline_grayscale"
  use_tensorboard: true

data:
  data_dir: "data/subregion"  # dataset root with grayscale/ and label/ subdirs
  json_file: "dataset.json"
  spatial_size: [160, 160, 160]
  target_spacing: [1.0, 1.0, 1.0]
  use_spacing: true

model:
  type: "unet"
  in_channels: 1
  out_channels: 8
  spatial_dims: 3
  channels: [16, 32, 64, 128, 256]
  strides: [2, 2, 2, 2]
  num_res_units: 2
  norm_name: "instance"
  dropout_rate: 0.0

training:
  max_iterations: 50000
  eval_num: 500
  batch_size: 1
  val_batch_size: 16
  seed: 42

augmentation:
  flip_prob: 0.20
  rotation_prob: 0.20
  rotation_max_k: 3

optimizer:
  type: "AdamW"
  lr: 0.0001
  weight_decay: 0.00001

scheduler:
  use_scheduler: true
  warmup_steps: 1000
  end_lr: 0.000001
  cycles: 0.5
  warmup_multiplier: 0.0

dataloader:
  num_workers: 8
  val_num_workers: 4
  pin_memory: true
